# docker-compose.existing.yml — Use with an existing MongoDB instance
# Usage: docker compose -f docker-compose.existing.yml up -d --build

services:
  app:
    build: .
    container_name: taskmanager-app
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGO_URI=${MONGO_URI:-mongodb://10.10.1.1:27017/taskmanager}
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET:-change_me_jwt_secret}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-change_me_refresh_secret}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-manuel@steka.ch}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-noreply@taskmanager.app}
      - CLIENT_URL=${CLIENT_URL:-http://localhost}
    volumes:
      - uploads:/app/uploads

volumes:
  uploads:
