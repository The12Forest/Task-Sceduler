<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#7c3aed" />
    <title>Task Manager - Offline</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #0f0f23;
        color: #e0e0e0;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 1rem;
      }
      .container {
        text-align: center;
        max-width: 400px;
      }
      .icon {
        width: 80px;
        height: 80px;
        background: rgba(124, 58, 237, 0.15);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 1.5rem;
      }
      .icon svg {
        width: 40px;
        height: 40px;
        stroke: #7c3aed;
      }
      h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
      p { color: #888; margin-bottom: 1.5rem; line-height: 1.6; }
      button {
        padding: 0.75rem 1.5rem;
        background: #7c3aed;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 1rem;
        cursor: pointer;
        transition: background 0.2s;
      }
      button:hover { background: #6d28d9; }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="icon">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M18.364 5.636a9 9 0 010 12.728m-2.829-2.829a5 5 0 000-7.07m-4.243 4.243a1 1 0 01-1.414 0m0 0a1 1 0 010-1.414" />
        </svg>
      </div>
      <h1>You're Offline</h1>
      <p>It looks like you've lost your internet connection. Don't worry — your tasks created offline will sync automatically when you're back online.</p>
      <button onclick="window.location.reload()">Try Again</button>
    </div>
  </body>
</html>
