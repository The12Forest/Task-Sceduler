# docker-compose.yml — Build from local source
# Usage: docker compose up -d --build
#
# Set EXTERNAL_PORT in .env or shell (default: 8080)

services:
  app:
    build: .
    container_name: taskmanager-app
    restart: unless-stopped
    ports:
      - "${EXTERNAL_PORT:-8080}:80"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/taskmanager?replicaSet=rs0
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET:-change_me_jwt_secret}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-change_me_refresh_secret}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-manuel@steka.ch}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-noreply@taskmanager.app}
      - CLIENT_URL=${CLIENT_URL:-http://localhost}
    volumes:
      - uploads:/app/uploads
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - taskmanager

  mongo:
    image: mongo:7
    container_name: taskmanager-mongo
    restart: unless-stopped
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: >-
        mongosh --quiet --eval "
          try { var s = rs.status(); if (s.ok) quit(0); else quit(1); }
          catch(e) { rs.initiate({_id:'rs0',members:[{_id:0,host:'mongo:27017'}]}); quit(1); }
        "
      interval: 5s
      timeout: 10s
      retries: 15
      start_period: 10s
    networks:
      - taskmanager

volumes:
  mongo-data:
  uploads:

networks:
  taskmanager:
    driver: bridge
