# docker-compose.yml — Pull from GitHub Container Registry
# Usage: docker compose up -d
#
# Copy .env.example to .env and fill in your values before starting.

services:
  app:
    image: ghcr.io/the12forest/task-scheduler:latest
    container_name: taskmanager-app
    restart: unless-stopped
    ports:
      - "80:80"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    volumes:
      - uploads:/app/uploads
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - taskmanager

  mongo:
    image: mongo:7
    container_name: taskmanager-mongo
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - taskmanager

volumes:
  mongo-data:
  uploads:

networks:
  taskmanager:
    driver: bridge
