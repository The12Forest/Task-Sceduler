# docker-compose.yml — Pull from GitHub Container Registry
# Usage: docker compose up -d
#
# Copy .env.example to .env and fill in your values before starting.
# Set EXTERNAL_PORT in .env (default: 8080)

services:
  app:
    image: ghcr.io/the12forest/task-scheduler:latest
    container_name: taskmanager-app
    restart: unless-stopped
    ports:
      - "${EXTERNAL_PORT:-8080}:80"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    volumes:
      - uploads:/app/uploads
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - taskmanager

  mongo:
    image: mongo:7
    container_name: taskmanager-mongo
    restart: unless-stopped
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: >-
        mongosh --quiet --eval "
          try { var s = rs.status(); if (s.ok) quit(0); else quit(1); }
          catch(e) { rs.initiate({_id:'rs0',members:[{_id:0,host:'mongo:27017'}]}); quit(1); }
        "
      interval: 5s
      timeout: 10s
      retries: 15
      start_period: 10s
    networks:
      - taskmanager

volumes:
  mongo-data:
  uploads:

networks:
  taskmanager:
    driver: bridge
